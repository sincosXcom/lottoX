name: Update Lottery Data

on:
  # schedule:
  #  - cron: '35 13 * * *'   # 每天北京时间 21:35 运行
  workflow_dispatch:        # 保留手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests gspread google-auth pandas
    - name: Run update script
      env:
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        KL8_URL: ${{ secrets.KL8_URL }}
        SSQ_URL: ${{ secrets.SSQ_URL }}
        DLT_URL: ${{ secrets.DLT_URL }}
        SD_URL: ${{ secrets.SD_URL }}
        P3_URL: ${{ secrets.P3_URL }}
        P5_URL: ${{ secrets.P5_URL }}
        QXC_URL: ${{ secrets.QXC_URL }}
        QLC_URL: ${{ secrets.QLC_URL }}
      run: python fetch_lottery_data.py
